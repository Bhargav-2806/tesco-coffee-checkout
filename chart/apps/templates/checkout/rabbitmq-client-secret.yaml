# RMQ creds copied into the checkout namespace for go-api to consume
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-client-credentials
  namespace: checkout
type: Opaque
data:
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.user | b64enc }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.pass | b64enc }}
