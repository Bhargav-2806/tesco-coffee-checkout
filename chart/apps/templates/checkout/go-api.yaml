# Go API — reads RMQ_USER / RMQ_PASS from secret, builds RABBITMQ_URL via $(VAR) substitution.
# Order matters: the referenced vars MUST be declared before the consumer.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
        - name: go-api
          image: {{ .Values.images.goApi.repository }}:{{ .Values.images.goApi.tag }}
          ports:
            - containerPort: 8080
          env:
            - name: RABBIT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-client-credentials
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBIT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-client-credentials
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBIT_USER):$(RABBIT_PASS)@rabbitmq.messaging:5672/"
---
apiVersion: v1
kind: Service
metadata:
  name: go-api
  namespace: checkout
spec:
  selector:
    app: go-api
  ports:
    - port: 8080
      targetPort: 8080
