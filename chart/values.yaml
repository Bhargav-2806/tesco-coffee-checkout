# values.yaml — every configurable thing lives here
# Override any of these with:  helm install tesco ./chart --set images.goApi.tag=v2
# Or keep a separate values-prod.yaml:  helm install tesco ./chart -f values-prod.yaml

# --- Container images (change tag here when you push a new version to Docker Hub) ---
images:
  goApi:
    repository: bhargav2806/tesco-go-api
    tag: latest
  reactNginx:
    repository: bhargav2806/tesco-react-nginx
    tag: latest
  springBoot:
    repository: bhargav2806/tesco-payment-service
    tag: latest
  rabbitmq: rabbitmq:3-management
  postgres: postgres:16-alpine

# --- RabbitMQ credentials (plain text here; Helm base64-encodes for the Secret) ---
rabbitmq:
  user: guest
  pass: secret123

# --- Postgres credentials + storage size ---
postgres:
  user: payments
  pass: payments
  db: payments
  storage: 1Gi

# --- Ingress hostname (change per environment: dev/staging/prod) ---
ingress:
  host: tesco.localtest.me
