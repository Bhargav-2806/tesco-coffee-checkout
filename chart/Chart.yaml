# Chart metadata — Helm reads this to know the chart name/version
apiVersion: v2            # Helm 3 charts use v2
name: tesco               # chart name (also used as a prefix for resources if we want)
description: Tesco Coffee Checkout — React + Go + Spring Boot + RabbitMQ + Postgres
type: application         # "application" = normal app, "library" = shared helpers
version: 0.1.0            # chart version (bump when template structure changes)
appVersion: "1.0.0"       # version of the app being deployed (your image tag in spirit)
