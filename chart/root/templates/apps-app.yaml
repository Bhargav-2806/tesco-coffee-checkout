# Apps Application — go-api, react-nginx, spring-boot, ingress.
# prune=true: stateless workloads, safe to delete + recreate on drift.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tesco-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: chart/apps
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
