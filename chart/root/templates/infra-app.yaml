# Infra Application — Postgres + RabbitMQ + infra secrets.
# prune=false: never auto-delete stateful resources (your data's life depends on it).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tesco-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: chart/infra
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
