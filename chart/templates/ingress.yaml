# Single entry point at tesco.localtest.me → react-nginx
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tesco-ingress
  namespace: checkout
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: react-nginx
                port:
                  number: 80
