# RabbitMQ admin credentials — values come from values.yaml, Helm base64-encodes them
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: messaging
type: Opaque
data:
  # b64enc encodes the plain-text values from values.yaml into base64 at install time
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.user | b64enc }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.pass | b64enc }}
