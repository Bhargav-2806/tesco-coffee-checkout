# React SPA served by nginx — image from values.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-nginx
  namespace: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-nginx
  template:
    metadata:
      labels:
        app: react-nginx
    spec:
      containers:
        - name: react-nginx
          image: {{ .Values.images.reactNginx.repository }}:{{ .Values.images.reactNginx.tag }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: react-nginx
  namespace: checkout
spec:
  selector:
    app: react-nginx
  ports:
    - port: 80
      targetPort: 80
