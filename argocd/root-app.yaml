# Root Application — bootstrap. Apply this ONE file and it will create
# the child Applications (tesco-infra, tesco-apps), which in turn deploy everything.
#
# Usage:
#   kubectl apply -f argocd/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tesco-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Bhargav-2806/tesco-coffee-checkout.git
    targetRevision: main
    path: chart/root
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd          # child Applications are created here
  syncPolicy:
    automated:
      prune: true              # if we delete a child Application from Git, remove it
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
