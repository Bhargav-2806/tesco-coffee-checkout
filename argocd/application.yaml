# Single ArgoCD Application — manages the entire Tesco stack.
# Apply once:  kubectl apply -f argocd/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tesco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Bhargav-2806/tesco-coffee-checkout.git
    targetRevision: main
    path: chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true          # delete resources removed from Git
      selfHeal: true       # revert manual kubectl edits
    syncOptions:
      - ServerSideApply=true
