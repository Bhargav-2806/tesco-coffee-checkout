# ArgoCD Application — tells ArgoCD to watch our chart/ folder in GitHub
# and keep the cluster in sync with it (GitOps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tesco
  namespace: argocd        # ArgoCD itself lives here
spec:
  project: default

  # --- Where the config lives (Git) ---
  source:
    repoURL: https://github.com/Bhargav-2806/tesco-coffee-checkout.git
    targetRevision: main   # branch to follow
    path: chart            # folder containing Chart.yaml + templates/
    helm:
      valueFiles:
        - values.yaml

  # --- Where to deploy (our cluster) ---
  destination:
    server: https://kubernetes.default.svc
    namespace: default     # templates already specify their own namespaces

  # --- Keep cluster = Git, always ---
  syncPolicy:
    automated:
      prune: true          # delete resources removed from Git
      selfHeal: true       # revert manual kubectl edits
    syncOptions:
      - ServerSideApply=true
