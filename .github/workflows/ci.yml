# CI/CD — per-service pipeline with each stage as its own job.
#
# Pipeline per service:
#   build ─┐
#   sca   ─┼─→ docker-build ─→ image-scan ─→ push
#   sast  ─┘
#
# Scanners currently run in "report-only" mode (exit-code: 0). They print
# findings to the logs but don't block the pipeline. To make them blocking
# later, set exit-code to '1' on the Trivy steps and add `--error` to Semgrep.
#
# Image tag scheme: v${{ github.run_number }} (v1, v2, v3 ...)
#
# Required GitHub repo secrets:
#   DOCKERHUB_USERNAME = bhargav2806
#   DOCKERHUB_TOKEN    = Docker Hub PAT

name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'go-api/**'
      - 'payment-service/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # =====================================================================
  # Detect which services changed
  # =====================================================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      go-api:      ${{ steps.decide.outputs.go-api }}
      frontend:    ${{ steps.decide.outputs.frontend }}
      spring-boot: ${{ steps.decide.outputs.spring-boot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go-api:
              - 'go-api/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            spring-boot:
              - 'payment-service/**'
              - '.github/workflows/ci.yml'
      - id: decide
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "go-api=true"      >> "$GITHUB_OUTPUT"
            echo "frontend=true"    >> "$GITHUB_OUTPUT"
            echo "spring-boot=true" >> "$GITHUB_OUTPUT"
          else
            echo "go-api=${{ steps.filter.outputs.go-api }}"           >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}"       >> "$GITHUB_OUTPUT"
            echo "spring-boot=${{ steps.filter.outputs.spring-boot }}" >> "$GITHUB_OUTPUT"
          fi

  # =====================================================================
  # GO API — 6 stages
  # =====================================================================
  go-api-build:
    needs: detect
    if: needs.detect.outputs.go-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - working-directory: go-api
        run: |
          go mod tidy
          go build ./...

  go-api-sca:
    needs: detect
    if: needs.detect.outputs.go-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs (report only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: go-api
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  go-api-sast:
    needs: detect
    if: needs.detect.outputs.go-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep (report only)
        run: |
          pip install semgrep
          semgrep --config=p/default go-api/ || true

  go-api-docker-build:
    needs: [go-api-build, go-api-sca, go-api-sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t bhargav2806/tesco-go-api:v${{ github.run_number }} ./go-api
      - name: Save image to tarball
        run: docker save bhargav2806/tesco-go-api:v${{ github.run_number }} -o /tmp/go-api.tar
      - uses: actions/upload-artifact@v4
        with:
          name: go-api-image
          path: /tmp/go-api.tar
          retention-days: 1

  go-api-image-scan:
    needs: go-api-docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: go-api-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/go-api.tar
      - name: Trivy image scan (report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bhargav2806/tesco-go-api:v${{ github.run_number }}
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  go-api-push:
    needs: go-api-image-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: go-api-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/go-api.tar
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub
        run: docker push bhargav2806/tesco-go-api:v${{ github.run_number }}

  # =====================================================================
  # FRONTEND (React + nginx) — 6 stages
  # =====================================================================
  frontend-build:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: |
          npm ci
          npm run build

  frontend-sca:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs (report only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: frontend
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  frontend-sast:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep (report only)
        run: |
          pip install semgrep
          semgrep --config=p/default frontend/ || true

  frontend-docker-build:
    needs: [frontend-build, frontend-sca, frontend-sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t bhargav2806/tesco-react-nginx:v${{ github.run_number }} ./frontend
      - name: Save image to tarball
        run: docker save bhargav2806/tesco-react-nginx:v${{ github.run_number }} -o /tmp/frontend.tar
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend.tar
          retention-days: 1

  frontend-image-scan:
    needs: frontend-docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/frontend.tar
      - name: Trivy image scan (report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bhargav2806/tesco-react-nginx:v${{ github.run_number }}
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  frontend-push:
    needs: frontend-image-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/frontend.tar
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub
        run: docker push bhargav2806/tesco-react-nginx:v${{ github.run_number }}

  # =====================================================================
  # SPRING BOOT payment service — 6 stages
  # =====================================================================
  spring-boot-build:
    needs: detect
    if: needs.detect.outputs.spring-boot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - working-directory: payment-service
        run: mvn -B package -DskipTests

  spring-boot-sca:
    needs: detect
    if: needs.detect.outputs.spring-boot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs (report only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: payment-service
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  spring-boot-sast:
    needs: detect
    if: needs.detect.outputs.spring-boot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep (report only)
        run: |
          pip install semgrep
          semgrep --config=p/default payment-service/ || true

  spring-boot-docker-build:
    needs: [spring-boot-build, spring-boot-sca, spring-boot-sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t bhargav2806/tesco-payment-service:v${{ github.run_number }} ./payment-service
      - name: Save image to tarball
        run: docker save bhargav2806/tesco-payment-service:v${{ github.run_number }} -o /tmp/spring-boot.tar
      - uses: actions/upload-artifact@v4
        with:
          name: spring-boot-image
          path: /tmp/spring-boot.tar
          retention-days: 1

  spring-boot-image-scan:
    needs: spring-boot-docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spring-boot-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/spring-boot.tar
      - name: Trivy image scan (report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bhargav2806/tesco-payment-service:v${{ github.run_number }}
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  spring-boot-push:
    needs: spring-boot-image-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spring-boot-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/spring-boot.tar
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub
        run: docker push bhargav2806/tesco-payment-service:v${{ github.run_number }}

  # =====================================================================
  # Update Helm chart with new tags, commit back → ArgoCD picks it up
  # =====================================================================
  update-helm:
    needs: [detect, go-api-push, frontend-push, spring-boot-push]
    if: |
      always() &&
      (needs.go-api-push.result == 'success' ||
       needs.frontend-push.result == 'success' ||
       needs.spring-boot-push.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update values.yaml
        env:
          TAG: v${{ github.run_number }}
        run: |
          if [[ "${{ needs.go-api-push.result }}" == "success" ]]; then
            yq eval ".images.goApi.tag = \"$TAG\"" -i chart/values.yaml
          fi
          if [[ "${{ needs.frontend-push.result }}" == "success" ]]; then
            yq eval ".images.reactNginx.tag = \"$TAG\"" -i chart/values.yaml
          fi
          if [[ "${{ needs.spring-boot-push.result }}" == "success" ]]; then
            yq eval ".images.springBoot.tag = \"$TAG\"" -i chart/values.yaml
          fi
          echo "--- updated values.yaml ---"
          cat chart/values.yaml
      - name: Commit + push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chart/values.yaml
          git diff --cached --quiet || git commit -m "ci: bump image tags to v${{ github.run_number }} [skip ci]"
          git push
