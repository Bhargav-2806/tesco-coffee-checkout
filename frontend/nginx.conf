# One virtual server block listening on port 80 inside the container
server {
    # nginx listens on port 80 inside the container (docker-compose maps host 3000 -> here)
    listen 80;
    server_name localhost;

    # Serve the built React static files from /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        # Load index.html when someone visits "/"
        index index.html;
        # React Router needs any unknown path to fall back to index.html (SPA routing)
        try_files $uri /index.html;
    }

    # Anything starting with /api/ is reverse-proxied to the Go backend
    location /api/ {
        # "go-api" is the service name in docker-compose, Docker DNS resolves it automatically
        proxy_pass http://go-api:8080;
        # Forward original host + client info so backend logs look correct
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
